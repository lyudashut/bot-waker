name: Wake Bot

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "*/2 * * * *"
    
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send ping to Telegram bot
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.CHAT_ID }} \
          -d text="ping"
